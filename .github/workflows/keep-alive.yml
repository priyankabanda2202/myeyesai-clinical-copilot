name: Keep Render Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping VisionFlow health endpoint
        run: |
          curl -fsS --max-time 90 "https://visionflow-clinical-copilot.onrender.com/api/health" || true
